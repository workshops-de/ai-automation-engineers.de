name: 📅 Weekly Newsletter Generation

on:
  schedule:
    # Runs every Friday at 9:00 AM CET (8:00 AM UTC)
    - cron: '0 8 * * 5'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      generate_content:
        description: 'Generate newsletter with AI content'
        required: false
        default: true
        type: boolean

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Collect articles from last 7 days
        run: |
          chmod +x scripts/collect-weekly-articles.js
          node scripts/collect-weekly-articles.js --days 7 --output weekly-articles.json
          echo "📊 Articles collected:"
          if [ -f weekly-articles.json ]; then
            # Show summary of collected articles
            node -e "
              const data = JSON.parse(require('fs').readFileSync('weekly-articles.json', 'utf8'));
              console.log(\`📅 Date Range: \${data.summary.dateRange.start} - \${data.summary.dateRange.end}\`);
              console.log(\`📝 Total Articles: \${data.summary.total}\`);
              console.log('📂 Categories:');
              Object.entries(data.summary.categories).forEach(([cat, info]) => {
                console.log(\`  • \${cat}: \${info.count} articles\`);
              });
              console.log('🎯 Top Articles:');
              data.summary.topArticles.slice(0, 3).forEach((article, i) => {
                console.log(\`  \${i+1}. \${article.title} (\${article.date})\`);
              });
            "
          else
            echo "⚠️ No articles file generated"
          fi

      - name: 📅 Generate newsletter structure
        run: |
          chmod +x scripts/generate-newsletter.js
          node scripts/generate-newsletter.js

      - name: 🔍 Check for new newsletter
        id: check_changes
        run: |
          if git status --porcelain | grep -q "src/pages/newsletter/"; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 New newsletter detected"
            
            # Get the folder name for the new newsletter
            NEW_FOLDER=$(git status --porcelain | grep "src/pages/newsletter/" | head -1 | sed 's/.*src\/pages\/newsletter\///' | cut -d'/' -f1)
            echo "folder_name=$NEW_FOLDER" >> $GITHUB_OUTPUT
            echo "Newsletter folder: $NEW_FOLDER"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new newsletter generated (may already exist)"
          fi

      - name: 📝 Get current date info
        id: date_info
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          WEEK_NUMBER=$(date +%V)
          YEAR=$(date +%Y)
          FRIDAY_DATE=$(date +%Y-%m-%d)
          
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "week_number=$WEEK_NUMBER" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "friday_date=$FRIDAY_DATE" >> $GITHUB_OUTPUT
          
          echo "Current date: $CURRENT_DATE"
          echo "Week number: $WEEK_NUMBER"
          echo "Year: $YEAR"

      - name: 🤖 Generate AI newsletter content
        if: steps.check_changes.outputs.changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSLETTER_FOLDER: ${{ steps.check_changes.outputs.folder_name }}
        run: |
          NEWSLETTER_FILE="src/pages/newsletter/${NEWSLETTER_FOLDER}/index.md"
          
          if [ -f "$NEWSLETTER_FILE" ]; then
            echo "📝 Running AI content generation for: $NEWSLETTER_FILE"
            node scripts/ai-generate-newsletter-content.js --newsletter "$NEWSLETTER_FILE"
          else
            echo "⚠️ Newsletter file not found: $NEWSLETTER_FILE"
          fi

      - name: 🎯 Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            feat(newsletter): add weekly ai-automation newsletter KW${{ steps.date_info.outputs.week_number }}/${{ steps.date_info.outputs.year }}
            
            - AI-generated newsletter for week ${{ steps.date_info.outputs.week_number }}
            - Articles from the last 7 days automatically collected and summarized
            - Includes course promotion components
            - B2B focus on AI-automation and enterprise tools
          branch: newsletter/week-${{ steps.date_info.outputs.week_number }}-${{ steps.date_info.outputs.year }}
          title: "📅 Weekly Newsletter KW${{ steps.date_info.outputs.week_number }}/${{ steps.date_info.outputs.year }} - AI Generated"
          body: |
            ## 📅 Weekly Newsletter KW${{ steps.date_info.outputs.week_number }}/${{ steps.date_info.outputs.year }}
            
            AI-generated newsletter with content from the last 7 days of blog articles.
            
            ### 🤖 AI Content Generation
            
            Newsletter content was automatically generated using Claude AI based on collected articles.
            If AI generation was skipped (no API key), placeholders remain and can be filled manually
            using `prompts/weekly-newsletter-prompt.md`.
            
            ### 📚 Articles Auto-Included
            
            All articles from the last 7 days were collected and used to generate the newsletter content.
            
            ### 📁 Generated Files
            - `src/pages/newsletter/${{ steps.check_changes.outputs.folder_name }}/index.md`
            
            ### 🎯 Content Focus
            - AI-Automation Tools (N8N, Langflow, etc.)
            - Enterprise AI Solutions
            - Developer Tools (GitHub Copilot, Cursor, etc.)  
            - Business Process Automation
            - Multi-Agent Systems & MCP
            
            ### ✅ Features Included
            - ✅ Course promotion components (automatically integrated)
            - ✅ Responsive design
            - ✅ SEO optimized frontmatter
            - ✅ Professional B2B tone
            
            **Generated on**: ${{ steps.date_info.outputs.current_date }}
            **Week**: ${{ steps.date_info.outputs.week_number }}/${{ steps.date_info.outputs.year }}
          labels: |
            newsletter
            automated
          assignees: |
            ${{ github.repository_owner }}

      - name: 📊 Summary
        env:
          CHANGES: ${{ steps.check_changes.outputs.changes }}
          FOLDER_NAME: ${{ steps.check_changes.outputs.folder_name }}
          CURRENT_DATE: ${{ steps.date_info.outputs.current_date }}
          WEEK_NUMBER: ${{ steps.date_info.outputs.week_number }}
          YEAR: ${{ steps.date_info.outputs.year }}
        run: |
          echo "## 📅 Weekly Newsletter Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: ${CURRENT_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "**Week**: ${WEEK_NUMBER}/${YEAR}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add articles summary to GitHub summary
          if [ -f weekly-articles.json ]; then
            echo "### 📚 Articles Collected" >> $GITHUB_STEP_SUMMARY
            node -e "
              try {
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('weekly-articles.json', 'utf8'));
                console.log(\`**Total Articles**: \${data.summary.total}\`);
                console.log(\`**Date Range**: \${data.summary.dateRange.start} to \${data.summary.dateRange.end}\`);
                console.log('**Categories**:');
                Object.entries(data.summary.categories).forEach(([cat, info]) => {
                  console.log(\`- \${cat}: \${info.count} articles\`);
                });
              } catch(e) {
                console.log('No articles data available');
              }
            " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${CHANGES}" = "true" ]; then
            echo "✅ **Status**: Newsletter AI-generated from articles of the last 7 days" >> $GITHUB_STEP_SUMMARY
            echo "📁 **Folder**: ${FOLDER_NAME}" >> $GITHUB_STEP_SUMMARY
            echo "🔀 **PR**: Created pull request for review" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **Status**: Newsletter already exists for this week" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🤖 AI Generation" >> $GITHUB_STEP_SUMMARY
          echo "Newsletter content was automatically generated using Claude AI." >> $GITHUB_STEP_SUMMARY
          echo "Set the ANTHROPIC_API_KEY secret to enable AI content generation." >> $GITHUB_STEP_SUMMARY
